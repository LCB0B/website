<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Boucherie / viz</title>
    <meta name="description" content="Visualizations by Louis Boucherie.">
    <meta name="author" content="Louis Boucherie">
    <link rel="canonical" href="https://louisboucherie.com/viz/">
    <meta property="og:title" content="Louis Boucherie / viz">
    <meta property="og:description" content="Visualizations by Louis Boucherie.">
    <meta property="og:url" content="https://louisboucherie.com/viz/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://louisboucherie.com/image/moodboard_thumb.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://louisboucherie.com/image/moodboard_thumb.jpg">
    <link rel="icon" href="../image/favicon.png" type="image/png">
    <style>
        :root {
            --h2-font-size: 16px;
        }

        html, body {
            min-height: 100vh;
        }
        body {
            font-family: 'Cascade Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: #fafafa;
            color: #1a2828;
            text-align: left;
            padding: 36px 20px 20px 36px;
            margin: 0;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        main {
            flex: 1 0 auto;
        }

        h1 {
            font-size: 16px;
            position: relative;
            color: #3d3833;
        }
        h1 a {
            color: inherit;
            text-decoration: none;
            display: inline;
            font-size: inherit;
            margin: 0;
        }

        h2 {
            font-size: var(--h2-font-size);
            color: #1a2828;
            margin-top: calc(var(--h2-font-size) * -0.65);
            margin-bottom: calc(var(--h2-font-size) * 1.25);
            font-weight: normal;
        }
        h3 {
            font-size: 16px;
            color: #1a2828;
            margin-bottom: 1px;
            font-weight: normal;
        }
        h4 {
            font-size: 16px;
            color: #1a2828;
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: normal;
        }

        a {
            color: #0044aa;
            text-decoration: none;
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
            color: #0066dd;
        }

        hr {
            border: none;
            border-top: 1px dashed #aaa;
        }

        p b {
            color: #3d3833;
        }
        .page-heading {
            font-size: 16px;
            color: #3d3833;
            font-weight: bold;
            margin: 1em 0 0.9em 0;
            line-height: 1.4;
        }
        .top-nav {
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .top-nav a {
            display: inline-block;
            margin: 0 18px 0 0;
        }
        .bottom-links {
            margin-bottom: 8px;
        }
        .bottom-links a {
            display: inline-block;
            margin: 0 18px 0 0;
        }

        .works {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
        }
        .works li {
            margin: 0;
        }
        .works .work-link {
            display: block;
            margin: 0;
            color: #1a2828;
        }
        .works .work-link:hover {
            text-decoration: none;
            color: #0066dd;
        }
        .works img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #ddd;
            margin-bottom: 6px;
        }
        .works .label {
            color: #888;
        }

        .year {
            color: #888;
            margin-top: 22px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            :root {
                --h2-font-size: 28px;
            }
            body {
                font-size: 20px;
            }
            h1 {
                font-size: 22px;
            }
            h2 {
                font-size: 28px;
            }
            h3 {
                font-size: 16px;
            }
            h4 {
                font-size: 16px;
            }
            a {
                font-size: 16px;
            }
            .page-heading {
                font-size: 20px;
            }
            .works {
                grid-template-columns: 1fr;
            }
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: auto;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        .skip-link:focus {
            position: static;
            width: auto;
            height: auto;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <a href="#main" class="skip-link">skip to content</a>
    <main id="main">
        <h1><a href="../">louis boucherie</a></h1>
        <h2 aria-hidden="true"></h2>

        <nav class="top-nav">
            <a href="../">about</a>
            <a href="../blog/">blog</a>
            <a href="../viz/">viz</a>
            <a href="../talks/">talks</a>
            <a href="https://scholar.google.com/citations?user=UtfTBZ4AAAAJ&hl=en" target="_blank">publications</a>
            <a href="https://github.com/LCB0B" target="_blank">code</a>
            <a href="../contact/">contact</a>
        </nav>

        <h2 class="page-heading">visualizations</h2>

        <p class="year">2026</p>
        <ul class="works">
            <li>
                <a class="work-link" href="https://moodboard.mirand.ai/" target="_blank">
                    <img src="../image/moodboard_thumb.jpg" alt="moodboard" width="225" height="168" loading="lazy">
                    <span class="label">viz:</span> moodboard &mdash; 100k images
                </a>
            </li>
            <li>
                <a class="work-link" href="representation/">
                    <img src="representation/cover_2.png" alt="representation" width="2550" height="3300" loading="lazy">
                    <span class="label">viz:</span> representation
                </a>
            </li>
        </ul>

        <p class="year">2025</p>
        <ul class="works">
            <li>
                <a class="work-link" href="fashion/">
                    <img src="../image/fashion_thumb.png" alt="fashion" width="666" height="1000" loading="lazy">
                    <span class="label">viz:</span> fashion
                </a>
            </li>
            <li>
                <a class="work-link" href="dk/">
                    <img src="../image/dk_thumb.png" alt="dk2vec" width="1700" height="1675" loading="lazy">
                    <span class="label">viz:</span> dk2vec
                </a>
            </li>
        </ul>
    </main>

<footer style="margin-top: 30px;">
    <p style="text-align: left; font-size: 12px; color: #555;">
        &copy; 2026 Louis Boucherie. All rights reserved.
    </p>
</footer>
</body>
</html>
