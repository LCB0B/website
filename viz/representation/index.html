<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Boucherie / viz / representation</title>
    <meta name="description" content="Representation series — visualizations by Louis Boucherie.">
    <meta name="author" content="Louis Boucherie">
    <link rel="canonical" href="https://louisboucherie.com/viz/representation/">
    <meta property="og:title" content="Louis Boucherie / viz / representation">
    <meta property="og:description" content="Representation series — visualizations by Louis Boucherie.">
    <meta property="og:url" content="https://louisboucherie.com/viz/representation/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://louisboucherie.com/viz/representation/cover_2.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://louisboucherie.com/viz/representation/cover_2.png">
    <link rel="icon" href="../../image/favicon.png" type="image/png">
    <style>
        :root {
            --h2-font-size: 16px;
        }

        html, body {
            min-height: 100vh;
        }
        body {
            font-family: 'Cascade Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: #fafafa;
            color: #1a2828;
            text-align: left;
            padding: 36px 20px 20px 36px;
            margin: 0;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        main {
            flex: 1 0 auto;
        }

        h1 {
            font-size: 16px;
            position: relative;
            color: #3d3833;
        }
        h1 a {
            color: inherit;
            text-decoration: none;
            display: inline;
            font-size: inherit;
            margin: 0;
        }

        h2 {
            font-size: var(--h2-font-size);
            color: #1a2828;
            margin-top: calc(var(--h2-font-size) * -0.65);
            margin-bottom: calc(var(--h2-font-size) * 1.25);
            font-weight: normal;
        }

        a {
            color: #0044aa;
            text-decoration: none;
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
            color: #0066dd;
        }

        .top-nav {
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .top-nav a {
            display: inline-block;
            margin: 0 18px 0 0;
        }

        .image-container {
            margin-top: 10px;
            margin-bottom: 24px;
        }

        img {
            display: block;
            width: 100%;
            max-width: 847px;
            height: auto;
            cursor: zoom-in;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .lightbox.open {
            display: flex;
        }
        .lightbox img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            cursor: zoom-out;
        }

        hr {
            border: none;
            border-top: 1px dashed #aaa;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            :root {
                --h2-font-size: 28px;
            }
            body {
                font-size: 20px;
            }
            h1 {
                font-size: 22px;
            }
            h2 {
                font-size: 28px;
            }
            a {
                font-size: 16px;
            }
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: auto;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        .skip-link:focus {
            position: static;
            width: auto;
            height: auto;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <a href="#main" class="skip-link">skip to content</a>
    <main id="main">
        <h1><a href="../../">louis boucherie</a></h1>
        <h2 aria-hidden="true"></h2>

        <nav class="top-nav">
            <a href="../../">about</a>
            <a href="../../blog/">blog</a>
            <a href="../../viz/">viz</a>
            <a href="https://scholar.google.com/citations?user=UtfTBZ4AAAAJ&hl=en" target="_blank">publications</a>
            <a href="https://github.com/LCB0B" target="_blank">code</a>
            <a href="../../contact/">contact</a>
        </nav>

        <p><b>representation</b></p>

        <div class="image-container">
            <img src="cover_2.png" alt="representation - 2" class="zoomable">
        </div>

        <div class="image-container">
            <img src="cover_1.png" alt="representation - 1" class="zoomable">
        </div>
    </main>

    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        (function () {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            document.querySelectorAll('img.zoomable').forEach(function (img) {
                img.addEventListener('click', function () {
                    lightboxImg.src = img.src;
                    lightboxImg.alt = img.alt;
                    lightbox.classList.add('open');
                });
            });
            lightbox.addEventListener('click', function () {
                lightbox.classList.remove('open');
                lightboxImg.src = '';
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    lightbox.classList.remove('open');
                    lightboxImg.src = '';
                }
            });
        })();
    </script>

<footer style="margin-top: 30px;">
    <p style="text-align: left; font-size: 12px; color: #555;">
        &copy; 2026 Louis Boucherie. All rights reserved.
    </p>
</footer>
</body>
</html>
