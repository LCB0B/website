<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Boucherie / contact</title>
    <meta name="description" content="Contact Louis Boucherie.">
    <meta name="author" content="Louis Boucherie">
    <link rel="icon" href="../image/favicon.png" type="image/png">
    <style>
        :root {
            --h2-font-size: 16px;
        }

        html, body {
            min-height: 100vh;
        }
        body {
            font-family: 'Cascade Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: #fafafa;
            color: #1a2828;
            text-align: left;
            padding: 36px 20px 20px 36px;
            margin: 0;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        main {
            flex: 1 0 auto;
        }

        h1 {
            font-size: 16px;
            position: relative;
            color: #3d3833;
        }
        h1 a {
            color: inherit;
            text-decoration: none;
            display: inline;
            font-size: inherit;
            margin: 0;
        }

        h2 {
            font-size: var(--h2-font-size);
            color: #1a2828;
            margin-top: calc(var(--h2-font-size) * -0.65);
            margin-bottom: calc(var(--h2-font-size) * 1.25);
            font-weight: normal;
        }

        a {
            color: #0044aa;
            text-decoration: none;
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
            color: #0066dd;
        }

        .top-nav {
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .top-nav a {
            display: inline-block;
            margin: 0 18px 0 0;
        }

        p {
            font-size: 14px;
            line-height: 1.5;
        }
        p b {
            color: #3d3833;
        }
        p a {
            display: inline;
            margin: 0;
            font-size: inherit;
        }

        @media (max-width: 768px) {
            :root {
                --h2-font-size: 16px;
            }
            body {
                font-size: 20px;
            }
            h1 {
                font-size: 22px;
            }
            h2 {
                font-size: 16px;
            }
            a {
                font-size: 16px;
            }
            p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1><a href="../">louis boucherie</a></h1>
        <h2></h2>

        <nav class="top-nav">
            <a href="../">about</a>
            <a href="../blog/">blog</a>
            <a href="../viz/">viz</a>
            <a href="https://scholar.google.com/citations?user=UtfTBZ4AAAAJ&hl=en" target="_blank">publications</a>
            <a href="https://github.com/LCB0B" target="_blank">code</a>
            <a href="../contact/">contact</a>
        </nav>

        <p>
            <b>contact</b><br>
            email &mdash; <a href="mailto:louis@mirand.ai">louis@mirand.ai</a><br>
            bluesky &mdash; <a href="https://bsky.app/profile/louisboucherie.com" target="_blank">@louisboucherie.com</a><br>
            linkedin &mdash; <a href="https://www.linkedin.com/in/louis-boucherie" target="_blank">louis-boucherie</a>
        </p>
    </main>

<footer style="margin-top: 30px;">
    <p style="text-align: left; font-size: 12px; color: #555;">
        &copy; 2026 Louis Boucherie. All rights reserved.
    </p>
</footer>
</body>
</html>
