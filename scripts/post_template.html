<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Boucherie / blog / {{TITLE}}</title>
    <meta name="description" content="{{TITLE}}">
    <meta name="author" content="Louis Boucherie">
    <link rel="icon" href="../../image/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --h2-font-size: 16px;
        }

        html, body {
            min-height: 100vh;
        }
        body {
            font-family: 'Cascade Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: #fafafa;
            color: #1a2828;
            text-align: left;
            padding: 36px 20px 20px 36px;
            margin: 0;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        main {
            flex: 1 0 auto;
        }

        h1 {
            font-size: 16px;
            position: relative;
            color: #3d3833;
        }
        h1 a {
            color: inherit;
            text-decoration: none;
            display: inline;
            font-size: inherit;
            margin: 0;
        }

        h2 {
            font-size: var(--h2-font-size);
            color: #1a2828;
            margin-top: calc(var(--h2-font-size) * -0.65);
            margin-bottom: calc(var(--h2-font-size) * 1.25);
            font-weight: normal;
        }

        a {
            color: #0044aa;
            text-decoration: none;
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
            color: #0066dd;
        }

        .top-nav {
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .top-nav a {
            display: inline-block;
            margin: 0 18px 0 0;
        }

        #content {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #content h1 {
            font-size: 24px;
            font-weight: 700;
            color: #3d3833;
            margin: 8px 0 6px 0;
            line-height: 1.25;
            font-family: inherit;
        }
        #content h2 {
            font-size: 18px;
            font-weight: 700;
            color: #3d3833;
            margin-top: 28px;
            margin-bottom: 10px;
        }
        #content p {
            font-size: 16px;
            line-height: 1.65;
            margin: 0 0 16px 0;
        }
        #content a {
            display: inline;
            margin: 0;
            font-size: inherit;
        }
        #content blockquote {
            margin: 0 0 16px 0;
            padding: 0 0 0 14px;
            border-left: 3px solid #ddd;
            color: #555;
            font-style: italic;
        }
        #content blockquote p {
            margin: 0;
        }
        #content img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #ddd;
            border-radius: 2px;
            margin: 22px 0 6px 0;
        }
        #content img + em,
        #content p > em:only-child {
            display: block;
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            font-style: normal;
            margin-bottom: 16px;
        }
        #content hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 28px 0 16px 0;
        }

        @media (max-width: 768px) {
            :root {
                --h2-font-size: 28px;
            }
            body {
                font-size: 20px;
            }
            h1 {
                font-size: 22px;
            }
            h2 {
                font-size: 28px;
            }
            a {
                font-size: 16px;
            }
            #content h1 {
                font-size: 24px;
            }
            #content h2 {
                font-size: 20px;
            }
            #content p {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1><a href="../../">louis boucherie</a></h1>
        <h2 aria-hidden="true"></h2>

        <nav class="top-nav">
            <a href="../../">about</a>
            <a href="../../blog/">blog</a>
            <a href="../../viz/">viz</a>
            <a href="https://scholar.google.com/citations?user=UtfTBZ4AAAAJ&hl=en" target="_blank">publications</a>
            <a href="https://github.com/LCB0B" target="_blank">code</a>
            <a href="../../contact/">contact</a>
        </nav>

        <article id="content">{{CONTENT}}</article>
    </main>

<footer style="margin-top: 30px;">
    <p style="text-align: left; font-size: 12px; color: #555;">
        &copy; 2026 Louis Boucherie. All rights reserved.
    </p>
</footer>
</body>
</html>
