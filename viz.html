<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Boucherie / viz</title>
    <meta name="description" content="Visualizations by Louis Boucherie.">
    <meta name="author" content="Louis Boucherie">
    <link rel="icon" href="image/favicon.png" type="image/png">
    <style>
        :root {
            --h2-font-size: 16px;
        }

        html, body {
            min-height: 100vh;
        }
        body {
            font-family: 'Cascade Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: #fafafa;
            color: #1a2828;
            text-align: left;
            padding: 36px 20px 20px 36px;
            margin: 0;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        main {
            flex: 1 0 auto;
        }

        h1 {
            font-size: 16px;
            position: relative;
            color: #3d3833;
        }
        h1 a {
            color: inherit;
            text-decoration: none;
            display: inline;
            font-size: inherit;
            margin: 0;
        }

        h2 {
            font-size: var(--h2-font-size);
            color: #1a2828;
            margin-top: calc(var(--h2-font-size) * -0.65);
            margin-bottom: calc(var(--h2-font-size) * 1.25);
            font-weight: normal;
        }
        h3 {
            font-size: 16px;
            color: #1a2828;
            margin-bottom: 1px;
            font-weight: normal;
        }
        h4 {
            font-size: 16px;
            color: #1a2828;
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: normal;
        }

        a {
            color: #0044aa;
            text-decoration: none;
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
            color: #0066dd;
        }

        hr {
            border: none;
            border-top: 1px dashed #aaa;
        }

        p b {
            color: #3d3833;
        }
        .top-nav {
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .top-nav a {
            display: inline-block;
            margin: 0 18px 0 0;
        }
        .bottom-links {
            margin-bottom: 8px;
        }
        .bottom-links a {
            display: inline-block;
            margin: 0 18px 0 0;
        }

        .works {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
        }
        .works li {
            margin: 0;
        }
        .works .work-link {
            display: block;
            margin: 0;
            color: #1a2828;
        }
        .works .work-link:hover {
            text-decoration: none;
            color: #0066dd;
        }
        .works img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #ddd;
            margin-bottom: 6px;
        }
        .works .label {
            color: #888;
        }

        @media (max-width: 768px) {
            :root {
                --h2-font-size: 28px;
            }
            body {
                font-size: 20px;
            }
            h1 {
                font-size: 36px;
            }
            h2 {
                font-size: 28px;
            }
            h3 {
                font-size: 22px;
            }
            h4 {
                font-size: 22px;
            }
            a {
                font-size: 22px;
            }
            .works {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1><a href="index.html">louis boucherie</a></h1>
        <h2></h2>

        <nav class="top-nav">
            <a href="index.html">about</a>
            <a href="blog.html">blog</a>
            <a href="viz.html">viz</a>
            <a href="https://scholar.google.com/citations?user=UtfTBZ4AAAAJ&hl=en" target="_blank">publications</a>
            <a href="https://github.com/LCB0B" target="_blank">code</a>
            <a href="contact.html">contact</a>
        </nav>

        <p><b>visualizations</b></p>
        <ul class="works">
            <li>
                <a class="work-link" href="https://moodboard.mirand.ai/" target="_blank">
                    <img src="image/moodboard_thumb.jpg" alt="moodboard">
                    <span class="label">viz:</span> moodboard &mdash; 100k images
                </a>
            </li>
            <li>
                <a class="work-link" href="fashion.html">
                    <img src="image/fashion_thumb.png" alt="fashion">
                    <span class="label">viz:</span> fashion
                </a>
            </li>
            <li>
                <a class="work-link" href="dk.html">
                    <img src="image/dk_thumb.png" alt="dk2vec">
                    <span class="label">viz:</span> dk2vec
                </a>
            </li>
        </ul>
    </main>

<footer style="margin-top: 30px;">
    <p style="text-align: left; font-size: 12px; color: #555;">
        &copy; 2026 Louis Boucherie. All rights reserved.
    </p>
</footer>
</body>
</html>
