<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Boucherie / blog</title>
    <meta name="description" content="Blog by Louis Boucherie.">
    <meta name="author" content="Louis Boucherie">
    <link rel="canonical" href="https://louisboucherie.com/blog/">
    <link rel="alternate" type="application/rss+xml" title="Louis Boucherie / blog" href="/blog/feed.xml">
    <meta property="og:title" content="Louis Boucherie / blog">
    <meta property="og:description" content="Blog by Louis Boucherie.">
    <meta property="og:url" content="https://louisboucherie.com/blog/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://louisboucherie.com/image/blog_decoupling_fig1.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://louisboucherie.com/image/blog_decoupling_fig1.png">
    <link rel="icon" href="../image/favicon.png" type="image/png">
    <style>
        :root {
            --h2-font-size: 16px;
        }

        html, body {
            min-height: 100vh;
        }
        body {
            font-family: 'Cascade Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: #fafafa;
            color: #1a2828;
            text-align: left;
            padding: 36px 20px 20px 36px;
            margin: 0;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        main {
            flex: 1 0 auto;
        }

        h1 {
            font-size: 16px;
            position: relative;
            color: #3d3833;
        }
        h1 a {
            color: inherit;
            text-decoration: none;
            display: inline;
            font-size: inherit;
            margin: 0;
        }

        h2 {
            font-size: var(--h2-font-size);
            color: #1a2828;
            margin-top: calc(var(--h2-font-size) * -0.65);
            margin-bottom: calc(var(--h2-font-size) * 1.25);
            font-weight: normal;
        }
        h4 {
            font-size: 16px;
            color: #1a2828;
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: normal;
        }

        a {
            color: #0044aa;
            text-decoration: none;
            font-size: 16px;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
            color: #0066dd;
        }
        .inline-link {
            display: inline;
            color: #0044aa;
            text-decoration: none;
            margin: 0;
            font-size: inherit;
        }
        .inline-link:hover {
            text-decoration: underline;
            color: #0066dd;
        }

        .top-nav {
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .top-nav a {
            display: inline-block;
            margin: 0 18px 0 0;
        }

        p {
            line-height: 1.4;
        }
        p b {
            color: #3d3833;
        }

        .year {
            color: #888;
            margin-top: 22px;
            margin-bottom: 10px;
        }

        .posts {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
        }
        .posts li {
            margin: 0 0 18px 0;
        }
        .posts a.post-row {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            color: #1a2828;
            text-decoration: none;
            margin: 0;
            font-size: 16px;
        }
        .posts a.post-row:hover {
            text-decoration: none;
            color: #0066dd;
        }
        .posts img {
            width: 120px;
            height: auto;
            border: 1px solid #ddd;
            flex-shrink: 0;
        }
        .post-info {
            flex: 1;
            min-width: 0;
        }
        .post-row .post-title {
            display: block;
            color: #3d3833;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .post-row .post-date {
            display: block;
            color: #888;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .posts img {
                width: 90px;
                height: auto;
            }
        }

        @media (max-width: 768px) {
            :root {
                --h2-font-size: 28px;
            }
            body {
                font-size: 20px;
            }
            h1 {
                font-size: 22px;
            }
            h2 {
                font-size: 28px;
            }
            h4 {
                font-size: 16px;
            }
            a {
                font-size: 16px;
            }
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: auto;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        .skip-link:focus {
            position: static;
            width: auto;
            height: auto;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <a href="#main" class="skip-link">skip to content</a>
    <main id="main">
        <h1><a href="../">louis boucherie</a></h1>
        <h2 aria-hidden="true"></h2>

        <nav class="top-nav">
            <a href="../">about</a>
            <a href="../blog/">blog</a>
            <a href="../viz/">viz</a>
            <a href="../talks/">talks</a>
            <a href="https://scholar.google.com/citations?user=UtfTBZ4AAAAJ&hl=en" target="_blank">publications</a>
            <a href="https://github.com/LCB0B" target="_blank">code</a>
            <a href="../contact/">contact</a>
        </nav>

        <p><b>blog</b></p>

        <p class="year">2025</p>
        <ul class="posts">
            <li>
                <a class="post-row" href="decoupling/">
                    <img src="../image/blog_decoupling_fig1.png" alt="decoupling thumbnail" width="685" height="386" loading="lazy">
                    <span class="post-info">
                        <span class="post-title">decoupling geographical constraints from human mobility</span>
                        <span class="post-date">sep 8, 2025</span>
                    </span>
                </a>
            </li>
        </ul>
    </main>

<footer style="margin-top: 30px;">
    <p style="text-align: left; font-size: 12px; color: #555;">
        &copy; 2026 Louis Boucherie. All rights reserved.
    </p>
</footer>
</body>
</html>
